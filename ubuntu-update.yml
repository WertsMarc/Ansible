---
- name: Update Ubuntu 24.04 naar nieuwste packages (incl. Update 3)
  hosts: production
  become: yes
  tasks:
    - name: Update APT cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade alle packages (dist-upgrade)
      ansible.builtin.apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes
    - name: Check of reboot nodig
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_req

    - name: Reboot indien nodig
      ansible.builtin.reboot:
        reboot_timeout: 600
        post_reboot_delay: 30
      when: reboot_req.stat.exists
